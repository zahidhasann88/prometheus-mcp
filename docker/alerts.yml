# Demo alerts so `get_alerts` returns something interesting.
groups:
  - name: demo
    rules:
      - alert: HighNodeCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is above 80% for 2 minutes."

      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "node-exporter is down"
          description: "Prometheus cannot scrape {{ $labels.instance }}."
